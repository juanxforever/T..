<!DOCTYPE html> 
<html lang="es"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>WINAMP IPTV</title> 
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"> 
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet"> 
    <style>
        /* ===== ESTILO WINAMP CLÁSICO ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Tahoma', 'Segoe UI', sans-serif;
            background: #c0c0c0;
            color: #000;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* HEADER */
        .winamp-header {
            background: linear-gradient(to right, #000080, #1084d0);
            color: white;
            padding: 6px 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 2px solid #404040;
            flex-shrink: 0;
        }

        /* CONTROLES SUPERIORES */
        .top-controls {
            background: #c0c0c0;
            border-bottom: 2px solid #808080;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-shrink: 0;
        }
        .menu {
            display: flex;
            overflow-x: auto;
            gap: 6px;
            padding: 4px;
        }
        .menu button {
            padding: 6px 12px;
            border: 2px solid #808080;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            border-right-color: #404040;
            border-bottom-color: #404040;
            background: #c0c0c0;
            color: #000;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .menu button.active {
            border-top-color: #404040;
            border-left-color: #404040;
            border-right-color: #ffffff;
            border-bottom-color: #ffffff;
            background: #000080;
            color: white;
        }

        /* CONTENEDOR DE BÚSQUEDA Y MODO - AHORA EN LA MISMA LÍNEA */
        .search-mode-container {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
        }
        .search-container {
            position: relative;
            flex: 1;
        }
        .search-container .material-icons {
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            color: #000;
            font-size: 18px;
        }
        #search {
            width: 100%;
            padding: 6px 10px 6px 35px;
            border: 2px solid #808080;
            border-top-color: #404040;
            border-left-color: #404040;
            border-right-color: #ffffff;
            border-bottom-color: #ffffff;
            background: #ffffff;
            color: #000;
            outline: none;
            font-size: 13px;
        }

        /* SELECTOR DE MODO - AHORA A LA DERECHA DEL BUSCADOR */
        .mode-selector {
            display: flex;
            gap: 4px;
            background: #c0c0c0;
            border: 2px solid #808080;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            border-right-color: #404040;
            border-bottom-color: #404040;
            padding: 2px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            flex-shrink: 0;
        }
        .mode-btn {
            padding: 4px 8px;
            border: 2px solid #808080;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            border-right-color: #404040;
            border-bottom-color: #404040;
            background: #c0c0c0;
            color: #000;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .mode-btn:active {
            border-top-color: #404040;
            border-left-color: #404040;
            border-right-color: #ffffff;
            border-bottom-color: #ffffff;
        }
        .mode-btn.active {
            background: #000080;
            color: white;
        }

        /* CONTENEDOR PRINCIPAL - EN COLUMNA */
        .main-container {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
            gap: 4px;
            padding: 4px;
            background: #c0c0c0;
        }

        /* REPRODUCTOR WINAMP */
        .winamp-player {
            background: #c0c0c0;
            border: 3px solid #808080;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            border-right-color: #404040;
            border-bottom-color: #404040;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .winamp-title-bar {
            background: linear-gradient(to right, #000080, #1084d0);
            color: white;
            padding: 4px 8px;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }
        
        /* VIDEO */
        .winamp-video-container {
            background: #000;
            margin: 8px 8px 4px 8px;
            border: 2px solid #808080;
            border-top-color: #404040;
            border-left-color: #404040;
            border-right-color: #ffffff;
            border-bottom-color: #ffffff;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            display: none;
            position: relative;
        }
        .winamp-video-container video {
            width: 100%;
            height: 100%;
            background: #000;
            object-fit: contain;
        }
        .winamp-video-container.visible { display: block; }

        /* DISPLAY */
        .winamp-display-container {
            background: #000;
            border: 3px solid #808080;
            border-top-color: #404040;
            border-left-color: #404040;
            border-right-color: #ffffff;
            border-bottom-color: #ffffff;
            margin: 4px 8px;
            padding: 2px;
            overflow: hidden;
            height: 45px;
            position: relative;
        }
        .winamp-display-text {
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            text-shadow: 0 0 8px #00ff00;
            white-space: nowrap;
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
        }

        /* VISUALIZADOR - SOLO VISIBLE EN MODO AUDIO */
        .winamp-visualizer {
            background: #000;
            border: 2px solid #808080;
            height: 60px;
            margin: 0 8px 4px 8px;
            display: flex;
            align-items: flex-end;
            gap: 2px;
            padding: 4px;
            display: none;
        }
        .winamp-visualizer.visible {
            display: flex;
        }
        .spectrum-bar {
            background: #00ff00;
            width: 100%;
            height: 2px;
            min-height: 2px;
            flex: 1;
            transition: height 0.05s ease;
            box-shadow: 0 0 5px #00ff00;
        }

        .winamp-info-line {
            display: flex;
            justify-content: space-between;
            padding: 0 10px 4px;
            font-size: 11px;
            font-weight: bold;
        }

        /* SEEK BAR */
        .winamp-seekbar {
            background: #000;
            border: 2px solid #808080;
            height: 12px;
            margin: 0 8px 6px 8px;
            position: relative;
            cursor: pointer;
        }
        .winamp-seekbar-fill {
            background: #00ff00;
            height: 100%;
            width: 0%;
            box-shadow: 0 0 5px #00ff00;
        }

        /* BOTONES */
        .winamp-controls {
            display: flex;
            justify-content: center;
            gap: 6px;
            padding: 6px 8px;
        }
        .winamp-btn {
            background: #c0c0c0;
            border: 2px solid #808080;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            border-right-color: #404040;
            border-bottom-color: #404040;
            width: 40px;
            height: 32px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
        }
        .winamp-btn.primary { width: 55px; font-size: 18px; }
        .winamp-btn:active {
            border-top-color: #404040;
            border-left-color: #404040;
            border-right-color: #ffffff;
            border-bottom-color: #ffffff;
        }

        /* BOTÓN PANTALLA COMPLETA EN BARRA EXTERNA */
        .fullscreen-btn-external {
            background: #c0c0c0;
            border: 2px solid #808080;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            border-right-color: #404040;
            border-bottom-color: #404040;
            width: 40px;
            height: 32px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            margin-left: 10px;
        }
        .fullscreen-btn-external:active {
            border-top-color: #404040;
            border-left-color: #404040;
            border-right-color: #ffffff;
            border-bottom-color: #ffffff;
        }

        /* VOLUMEN */
        .winamp-volume-section {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 8px 8px 8px;
        }
        .winamp-volume-bar {
            flex: 1;
            background: #000;
            border: 2px solid #808080;
            height: 12px;
            cursor: pointer;
        }
        .winamp-volume-fill {
            background: #00ff00;
            height: 100%;
            width: 70%;
        }

        /* LISTA DE REPRODUCCIÓN - DEBAJO */
        .winamp-playlist-box {
            background: #c0c0c0;
            border: 3px solid #808080;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            border-right-color: #404040;
            border-bottom-color: #404040;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
            min-height: 200px;
        }
        .winamp-playlist-header {
            background: linear-gradient(to right, #000080, #1084d0);
            color: white;
            padding: 6px 10px;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .winamp-playlist-content {
            flex: 1;
            overflow-y: auto;
            padding: 2px 0;
        }
        .winamp-playlist-content::-webkit-scrollbar {
            width: 16px;
            background: #c0c0c0;
        }
        .winamp-playlist-content::-webkit-scrollbar-thumb {
            background: #c0c0c0;
            border: 2px solid #808080;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
        }
        .playlist-item-winamp {
            padding: 8px 12px;
            font-size: 12px;
            color: #000;
            cursor: pointer;
            border-bottom: 1px solid #a0a0a0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .playlist-item-winamp:hover,
        .playlist-item-winamp.active {
            background: #000080;
            color: white;
        }
        .genre-tag-winamp {
            font-size: 10px;
            background: #808080;
            color: white;
            padding: 2px 8px;
            border-radius: 2px;
        }
        .playlist-item-winamp.active .genre-tag-winamp {
            background: white;
            color: #000080;
        }

        /* LOADING */
        #loading {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #c0c0c0;
            border: 3px solid #808080;
            padding: 20px 40px;
            z-index: 10002;
            display: none;
            text-align: center;
        }
        .loading-spinner {
            width: 30px; height: 30px;
            border: 3px solid #808080;
            border-top-color: #000080;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .wake-indicator {
            position: fixed; top: 10px; left: 10px;
            background: #000080; border: 2px solid #fff;
            color: #00ff00; padding: 5px 10px;
            font-size: 11px; opacity: 0; z-index: 9999;
        }
        .wake-indicator.active { opacity: 1; }

        /* ===== CONTROLES DE PANTALLA COMPLETA ===== */
        .fullscreen-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 9998;
            flex-direction: column;
        }
        
        .fullscreen-overlay.active {
            display: flex;
        }

        .fullscreen-video-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            position: relative;
        }

        .fullscreen-video-container video {
            max-width: 100%;
            max-height: 100%;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .fullscreen-controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(192, 192, 192, 0.95);
            border: 2px solid #808080;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            border-right-color: #404040;
            border-bottom-color: #404040;
            padding: 8px 15px;
            display: flex;
            gap: 8px;
            align-items: center;
            opacity: 1;
            transition: opacity 0.3s ease;
            z-index: 9999;
            pointer-events: auto;
        }

        .fullscreen-controls.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .fullscreen-controls .winamp-btn {
            width: 35px;
            height: 28px;
            font-size: 12px;
        }

        .fullscreen-controls .winamp-btn.primary {
            width: 45px;
            font-size: 16px;
        }

        .fullscreen-exit-btn {
            background: #c0c0c0;
            border: 2px solid #808080;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            border-right-color: #404040;
            border-bottom-color: #404040;
            width: 35px;
            height: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            margin-left: 8px;
        }

        .fullscreen-exit-btn:active {
            border-top-color: #404040;
            border-left-color: #404040;
            border-right-color: #ffffff;
            border-bottom-color: #ffffff;
        }

        .fullscreen-seekbar {
            position: absolute;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            width: 50%;
            max-width: 600px;
            background: #000;
            border: 2px solid #808080;
            height: 10px;
            cursor: pointer;
            opacity: 1;
            transition: opacity 0.3s ease;
            z-index: 9999;
        }

        .fullscreen-seekbar.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .fullscreen-seekbar-fill {
            background: #00ff00;
            height: 100%;
            width: 0%;
            box-shadow: 0 0 8px #00ff00;
        }

        .fullscreen-info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            padding: 8px 15px;
            border: 2px solid #00ff00;
            text-shadow: 0 0 8px #00ff00;
            opacity: 1;
            transition: opacity 0.3s ease;
            z-index: 9999;
            max-width: 70%;
        }

        .fullscreen-info.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .fullscreen-mode-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #000080;
            color: white;
            padding: 6px 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            font-weight: bold;
            border: 2px solid #ffffff;
            opacity: 1;
            transition: opacity 0.3s ease;
            z-index: 9999;
        }

        .fullscreen-mode-indicator.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .fullscreen-overlay.hide-cursor {
            cursor: none;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="wake-indicator" id="wake-indicator">⚡</div>

    <div class="winamp-header">
        <span class="material-icons">graphic_eq</span>TV
    </div>

    <div class="top-controls">
        <div class="menu" id="menu">
            <button class="active" data-category="Todos"><span>🌐</span> Todos</button>
        </div>
        <div class="search-mode-container">
            <div class="search-container">
                <span class="material-icons">search</span>
                <input type="text" id="search" placeholder="Buscar canal...">
            </div>
            <!-- SELECTOR DE MODO MOVADO A LA DERECHA DEL BUSCADOR -->
            <div class="mode-selector">
                <button class="mode-btn active" id="mode-video" onclick="setMode('video')"><span class="material-icons">videocam</span> VIDEO</button>
                <button class="mode-btn" id="mode-audio" onclick="setMode('audio')"><span class="material-icons">audiotrack</span> AUDIO</button>
            </div>
        </div>
    </div>

    <div class="main-container">
        <!-- REPRODUCTOR - ARRIBA -->
        <div class="winamp-player">
            <div class="winamp-title-bar">
                <span>WINAMP LITE</span>
                <span>📺</span>
            </div>

            <div class="winamp-video-container" id="winamp-video-container">
                <video id="winamp-video-element" playsinline crossorigin="anonymous"></video>
            </div>

            <div class="winamp-display-container">
                <div class="winamp-display-text" id="winamp-display">🎵 WINAMP READY</div>
            </div>

            <!-- VISUALIZADOR -->
            <div class="winamp-visualizer" id="visualizer"></div>

            <div class="winamp-info-line">
                <span id="winamp-genre">País: -</span>
                <span id="winamp-time">00:00 / 00:00</span>
            </div>

            <div class="winamp-seekbar" id="winamp-seekbar" onclick="seekAudio(event)">
                <div class="winamp-seekbar-fill" id="winamp-seekbar-fill"></div>
            </div>

            <div class="winamp-controls">
                <button class="winamp-btn" onclick="prevChannel()">|◀</button>
                <button class="winamp-btn" onclick="stopAudio()">■</button>
                <button class="winamp-btn primary" onclick="toggleAudioPlay()" id="winamp-play-btn">▶</button>
                <button class="winamp-btn" onclick="pauseAudio()">❚❚</button>
                <button class="winamp-btn" onclick="nextChannel()">▶|</button>
                <button class="fullscreen-btn-external" onclick="toggleFullscreen()" title="Pantalla Completa">☐</button>
            </div>

            <div class="winamp-volume-section">
                <span>Vol:</span>
                <div class="winamp-volume-bar" onclick="setVolume(event)">
                    <div class="winamp-volume-fill" id="winamp-volume-fill"></div>
                </div>
                <span id="winamp-volume-text">70%</span>
            </div>
        </div>

        <!-- LISTA - DEBAJO DEL REPRODUCTOR -->
        <div class="winamp-playlist-box">
            <div class="winamp-playlist-header">
                <span>📋 CANALES </span>
                <span id="winamp-playlist-count">0 items</span>
            </div>
            <div class="winamp-playlist-content" id="winamp-playlist-content"></div>
        </div>
    </div>

   <!-- OVERLAY DE PANTALLA COMPLETA -->
<div class="fullscreen-overlay" id="fullscreen-overlay">
    <div class="fullscreen-video-container" id="fullscreen-video-container">
        <div class="fullscreen-info" id="fullscreen-info">
            <div id="fullscreen-title"></div>
     <div id="fullscreen-genre" style="font-size: 11px; margin-top: 3px; color: #aaa;">País</div>
        </div>
        <div class="fullscreen-seekbar" id="fullscreen-seekbar" onclick="seekFullscreen(event)">
            <div class="fullscreen-seekbar-fill" id="fullscreen-seekbar-fill"></div>
        </div>

        <div class="fullscreen-controls" id="fullscreen-controls">
            <button class="winamp-btn" onclick="prevChannel()">|◀</button>
            <button class="winamp-btn" onclick="stopAudio()">■</button>
            <button class="winamp-btn primary" onclick="toggleAudioPlay()" id="fullscreen-play-btn">▶</button>
            <button class="winamp-btn" onclick="pauseAudio()">❚❚</button>
            <button class="winamp-btn" onclick="nextChannel()">▶|</button>
            <button class="fullscreen-exit-btn" onclick="exitFullscreenMode()" title="Salir">☒</button>
        </div>
    </div>
</div>

    <div id="loading"><div class="loading-spinner"></div><div>CARGANDO CANALES...</div></div>

    <script>
        // ===== CONFIGURACIÓN =====
        let PLAYLIST = [];
        let FILTERED_PLAYLIST = [];
        let idx = 0;
        let currentMode = 'video';
        let activeCategory = 'Todos';
        let isShuffle = false;
        let isRepeat = false;
        let isFullscreen = false;
        
        // Variables para el visualizador de audio
        let audioContext = null;
        let analyser = null;
        let source = null;
        let animationId = null;
        let isVisualizerActive = false;

        // Variables para controles en pantalla completa
        let fullscreenTimeout;
        let isMouseMoving = false;

        // Elementos DOM
        const video = document.getElementById('winamp-video-element');
        const videoContainer = document.getElementById('winamp-video-container');
        const visualizerEl = document.getElementById('visualizer');
        const display = document.getElementById('winamp-display');
        const genreEl = document.getElementById('winamp-genre');
        const timeEl = document.getElementById('winamp-time');
        const playBtn = document.getElementById('winamp-play-btn');
        const seekbarFill = document.getElementById('winamp-seekbar-fill');
        const volumeFill = document.getElementById('winamp-volume-fill');
        const volumeText = document.getElementById('winamp-volume-text');
        const playlistEl = document.getElementById('winamp-playlist-content');
        const countEl = document.getElementById('winamp-playlist-count');
        const loading = document.getElementById('loading');

        // Elementos de pantalla completa
        const fullscreenOverlay = document.getElementById('fullscreen-overlay');
        const fullscreenControls = document.getElementById('fullscreen-controls');
        const fullscreenSeekbar = document.getElementById('fullscreen-seekbar');
        const fullscreenSeekbarFill = document.getElementById('fullscreen-seekbar-fill');
        const fullscreenInfo = document.getElementById('fullscreen-info');
        const fullscreenTitle = document.getElementById('fullscreen-title');
        const fullscreenGenre = document.getElementById('fullscreen-genre');
        const fullscreenPlayBtn = document.getElementById('fullscreen-play-btn');

        // URLs de los canales M3U
        const CHANNEL_URLS = [
            { name: 'Canales Argentina', url: 'https://raw.githubusercontent.com/iptv-org/iptv/master/streams/ar.m3u', icon: '🇦🇷' },

            { name: 'Canales China', url: 'https://raw.githubusercontent.com/iptv-org/iptv/master/streams/cn.m3u', icon: '🇨🇳' }
        ];

        // ===== FUNCIÓN PARA PARSEAR M3U =====
        function parseM3U(content, categoryName, icon) {
            const lines = content.split('\n');
            const channels = [];
            let currentChannel = null;

            for (let line of lines) {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    // Extraer información del canal
                    const match = line.match(/#EXTINF:-?\d+(?:.*?tvg-id="([^"]*)")?(?:.*?tvg-logo="([^"]*)")?(?:.*?),([^,\n]+)/);
                    let title = match ? match[3].trim() : 'Canal sin nombre';
                    
                    // Extraer grupo si existe
                    const groupMatch = line.match(/group-title="([^"]*)"/);
                    const group = groupMatch ? groupMatch[1] : categoryName;
                    
                    currentChannel = {
                        title: title,
                        group: group,
                        category: categoryName,
                        icon: icon
                    };
                } else if (line && !line.startsWith('#') && currentChannel) {
                    // Esta línea es la URL
                    currentChannel.url = line;
                    channels.push(currentChannel);
                    currentChannel = null;
                }
            }
            return channels;
        }

        // ===== FUNCIONES DEL VISUALIZADOR =====
        function initVisualizer() {
            const container = document.getElementById('visualizer');
            container.innerHTML = '';
            for (let i = 0; i < 32; i++) {
                const bar = document.createElement('div');
                bar.className = 'spectrum-bar';
                container.appendChild(bar);
            }
        }

        async function setupAudioVisualizer() {
            if (audioContext && analyser && source) return;

            try {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }

                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }

                if (!analyser) {
                    analyser = audioContext.createAnalyser();
                    analyser.fftSize = 256;
                    analyser.smoothingTimeConstant = 0.7;
                }

                if (source) {
                    try {
                        source.disconnect();
                    } catch (e) {}
                }

                source = audioContext.createMediaElementSource(video);
                source.connect(analyser);
                analyser.connect(audioContext.destination);

                console.log('✅ Visualizador de audio conectado');
            } catch (e) {
                console.error('Error configurando visualizador:', e);
            }
        }

        function startVisualizer() {
            if (currentMode !== 'audio') return;
            if (isVisualizerActive) return;
            
            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }

            isVisualizerActive = true;
            animateVisualizer();
        }

        function animateVisualizer() {
            if (!isVisualizerActive || !analyser) {
                resetVisualizerBars();
                return;
            }

            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(dataArray);
            
            const bars = document.querySelectorAll('.spectrum-bar');
            const step = Math.floor(dataArray.length / bars.length);

            bars.forEach((bar, i) => {
                let sum = 0;
                for (let j = 0; j < step; j++) {
                    const idx = i * step + j;
                    if (idx < dataArray.length) {
                        sum += dataArray[idx];
                    }
                }
                const avg = sum / step;
                const percent = (avg / 255) * 100;
                
                const height = Math.max(4, Math.min(95, percent));
                bar.style.height = height + '%';
                
                if (percent > 70) {
                    bar.style.background = '#00ff00';
                    bar.style.boxShadow = '0 0 15px #00ff00';
                } else if (percent > 40) {
                    bar.style.background = '#00cc00';
                    bar.style.boxShadow = '0 0 10px #00cc00';
                } else {
                    bar.style.background = '#008800';
                    bar.style.boxShadow = '0 0 5px #008800';
                }
            });

            animationId = requestAnimationFrame(animateVisualizer);
        }

        function resetVisualizerBars() {
            const bars = document.querySelectorAll('.spectrum-bar');
            bars.forEach(bar => {
                bar.style.height = '4%';
                bar.style.background = '#00ff00';
                bar.style.boxShadow = '0 0 5px #00ff00';
            });
        }

        function stopVisualizer() {
            isVisualizerActive = false;
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            resetVisualizerBars();
        }

        // ===== FUNCIONES DE PANTALLA COMPLETA =====
        let hideControlsTimeout;

        function showFullscreenControls() {
            if (fullscreenControls) fullscreenControls.classList.remove('hidden');
            if (fullscreenSeekbar) fullscreenSeekbar.classList.remove('hidden');
            if (fullscreenInfo) fullscreenInfo.classList.remove('hidden');
            fullscreenOverlay.classList.remove('hide-cursor');
            
            resetHideTimeout();
        }

        function hideFullscreenControls() {
            if (!isFullscreen) return;
            
            if (fullscreenControls) fullscreenControls.classList.add('hidden');
            if (fullscreenSeekbar) fullscreenSeekbar.classList.add('hidden');
            if (fullscreenInfo) fullscreenInfo.classList.add('hidden');
            fullscreenOverlay.classList.add('hide-cursor');
        }

        function resetHideTimeout() {
            if (hideControlsTimeout) {
                clearTimeout(hideControlsTimeout);
            }
            hideControlsTimeout = setTimeout(hideFullscreenControls, 3000);
        }

        function handleFullscreenMouseMove() {
            if (!isFullscreen) return;
            showFullscreenControls();
        }

        function handleFullscreenMouseLeave() {
            if (!isFullscreen) return;
            resetHideTimeout();
        }

        function toggleFullscreen() {
            if (!isFullscreen) {
                enterFullscreen();
            } else {
                exitFullscreenMode();
            }
        }

        function enterFullscreen() {
            if (!FILTERED_PLAYLIST.length) return;
            
            isFullscreen = true;
            
            const fullscreenContainer = document.getElementById('fullscreen-video-container');
            fullscreenContainer.insertBefore(video, fullscreenContainer.firstChild);
            
            const channel = FILTERED_PLAYLIST[idx];
            fullscreenTitle.textContent = channel.title || 'Canal';
            fullscreenGenre.textContent = 'País: ' + (channel.category || 'Desconocido');
            fullscreenPlayBtn.textContent = video.paused ? '▶' : '❚❚';
            
            fullscreenOverlay.classList.add('active');
            showFullscreenControls();
            
            fullscreenOverlay.addEventListener('mousemove', handleFullscreenMouseMove);
            fullscreenOverlay.addEventListener('mouseleave', handleFullscreenMouseLeave);
            
            if (!video.paused) {
                video.play().catch(e => console.log('Error reproduciendo:', e));
            }
            
            setMode('video');
        }

        function exitFullscreenMode() {
            if (!isFullscreen) return;
            
            isFullscreen = false;
            
            const normalContainer = document.getElementById('winamp-video-container');
            normalContainer.appendChild(video);
            
            fullscreenOverlay.classList.remove('active');
            fullscreenOverlay.classList.remove('hide-cursor');
            
            if (fullscreenControls) fullscreenControls.classList.remove('hidden');
            if (fullscreenSeekbar) fullscreenSeekbar.classList.remove('hidden');
            if (fullscreenInfo) fullscreenInfo.classList.remove('hidden');
            
            if (hideControlsTimeout) {
                clearTimeout(hideControlsTimeout);
            }
            
            fullscreenOverlay.removeEventListener('mousemove', handleFullscreenMouseMove);
            fullscreenOverlay.removeEventListener('mouseleave', handleFullscreenMouseLeave);
            
            if (!video.paused) {
                video.play().catch(e => console.log('Error reproduciendo:', e));
            }
        }

        function seekFullscreen(e) {
            if (!video.duration) return;
            const rect = e.currentTarget.getBoundingClientRect();
            let percent = (e.clientX - rect.left) / rect.width;
            percent = Math.max(0, Math.min(1, percent));
            video.currentTime = percent * video.duration;
            showFullscreenControls();
        }

        // ===== FUNCIONES DE CARGA DE DATOS =====
        async function loadAllChannels() {
            loading.style.display = 'block';
            PLAYLIST = [];

            // Cargar canales en paralelo para mayor velocidad
            const fetchPromises = CHANNEL_URLS.map(async (cat) => {
                try {
                    console.log(`Cargando ${cat.name}...`);
                    const response = await fetch(cat.url);
                    const content = await response.text();
                    
                    // Parsear el contenido M3U
                    const channels = parseM3U(content, cat.name, cat.icon);
                    
                    channels.forEach(channel => {
                        if (channel.url) {
                            PLAYLIST.push({
                                title: channel.title,
                                video: channel.url,
                                category: cat.name,
                                icon: cat.icon,
                                group: channel.group
                            });
                        }
                    });
                    
                    console.log(`✅ Cargados ${channels.length} canales de ${cat.name}`);
                } catch (e) {
                    console.error(`Error cargando ${cat.name}:`, e);
                }
            });

            await Promise.all(fetchPromises);

            loading.style.display = 'none';
            
            if (PLAYLIST.length === 0) {
                // Si no hay canales, mostrar mensaje
                display.textContent = '❌ No se pudieron cargar canales';
                return;
            }
            
            FILTERED_PLAYLIST = [...PLAYLIST];
            createCategoryFilters();
            renderPlaylist();
            
            if (PLAYLIST.length > 0) {
                loadChannel(0);
            }
        }

        function createCategoryFilters() {
            const menu = document.getElementById('menu');
            // Limpiar excepto el botón "Todos"
            while (menu.children.length > 1) {
                menu.removeChild(menu.lastChild);
            }

            CHANNEL_URLS.forEach(cat => {
                const btn = document.createElement('button');
                btn.innerHTML = `<span>${cat.icon}</span> ${cat.name}`;
                btn.dataset.category = cat.name;
                btn.onclick = () => filterByCategory(cat.name);
                menu.appendChild(btn);
            });
        }

        function filterByCategory(category) {
            activeCategory = category;
            document.querySelectorAll('.menu button').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.category === category);
            });
            filterItems();
        }

        function filterItems() {
            const searchTerm = document.getElementById('search').value.toLowerCase();
            FILTERED_PLAYLIST = PLAYLIST.filter(item => {
                const matchCat = activeCategory === 'Todos' || item.category === activeCategory;
                const matchSearch = item.title.toLowerCase().includes(searchTerm);
                return matchCat && matchSearch;
            });
            renderPlaylist();
        }

        function renderPlaylist() {
            playlistEl.innerHTML = '';
            countEl.textContent = FILTERED_PLAYLIST.length + ' canales';

            FILTERED_PLAYLIST.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'playlist-item-winamp' + (i === idx ? ' active' : '');
                div.innerHTML = `<span>${i+1}. ${item.icon || '📺'} ${item.title}</span><span class="genre-tag-winamp">${item.category}</span>`;
                div.onclick = () => loadChannel(i);
                playlistEl.appendChild(div);
            });
        }

        // ===== FUNCIONES DE REPRODUCCIÓN =====
        async function loadChannel(index) {
            if (!FILTERED_PLAYLIST.length) return;
            idx = index;
            const channel = FILTERED_PLAYLIST[idx];

            stopVisualizer();
            
            video.src = channel.video;
            video.load();
            
            display.textContent = channel.title;
            genreEl.textContent = 'País: ' + channel.category;
            renderPlaylist();

            if (isFullscreen) {
                fullscreenTitle.textContent = channel.title;
                fullscreenGenre.textContent = 'País: ' + channel.category;
            }

            try {
                await video.play();
                playBtn.textContent = '❚❚';
                fullscreenPlayBtn.textContent = '❚❚';
                
                await setupAudioVisualizer();
                if (currentMode === 'audio') {
                    startVisualizer();
                }
            } catch (e) {
                console.log('Autoplay bloqueado:', e);
                display.textContent = '🔊 CLICK PLAY';
            }
        }

        function toggleAudioPlay() {
            if (video.paused) {
                video.play().then(() => {
                    playBtn.textContent = '❚❚';
                    fullscreenPlayBtn.textContent = '❚❚';
                    if (audioContext && audioContext.state === 'suspended') {
                        audioContext.resume();
                    }
                    if (currentMode === 'audio') {
                        startVisualizer();
                    }
                }).catch(e => {
                    console.log('Error al reproducir:', e);
                });
            } else {
                video.pause();
                playBtn.textContent = '▶';
                fullscreenPlayBtn.textContent = '▶';
                stopVisualizer();
            }
            if (isFullscreen) showFullscreenControls();
        }

        function pauseAudio() { 
            video.pause(); 
            playBtn.textContent = '▶';
            fullscreenPlayBtn.textContent = '▶';
            stopVisualizer();
            if (isFullscreen) showFullscreenControls();
        }
        
        function stopAudio() {
            video.pause();
            video.currentTime = 0;
            seekbarFill.style.width = '0%';
            fullscreenSeekbarFill.style.width = '0%';
            display.textContent = '⏹️ DETENIDO';
            playBtn.textContent = '▶';
            fullscreenPlayBtn.textContent = '▶';
            stopVisualizer();
            if (isFullscreen) showFullscreenControls();
        }

        function nextChannel() {
            if (!FILTERED_PLAYLIST.length) return;
            let next = isShuffle ? 
                Math.floor(Math.random() * FILTERED_PLAYLIST.length) : 
                (idx + 1) % FILTERED_PLAYLIST.length;
            loadChannel(next);
            if (isFullscreen) showFullscreenControls();
        }
        
        function prevChannel() {
            if (!FILTERED_PLAYLIST.length) return;
            let prev = (idx - 1 + FILTERED_PLAYLIST.length) % FILTERED_PLAYLIST.length;
            loadChannel(prev);
            if (isFullscreen) showFullscreenControls();
        }

        function setVolume(e) {
            const rect = e.currentTarget.getBoundingClientRect();
            let percent = (e.clientX - rect.left) / rect.width;
            percent = Math.max(0, Math.min(1, percent));
            video.volume = percent;
            volumeFill.style.width = (percent * 100) + '%';
            volumeText.textContent = Math.round(percent * 100) + '%';
        }
        
        function seekAudio(e) {
            if (!video.duration) return;
            const rect = e.currentTarget.getBoundingClientRect();
            let percent = (e.clientX - rect.left) / rect.width;
            percent = Math.max(0, Math.min(1, percent));
            video.currentTime = percent * video.duration;
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('mode-video').classList.toggle('active', mode === 'video');
            document.getElementById('mode-audio').classList.toggle('active', mode === 'audio');
            videoContainer.classList.toggle('visible', mode === 'video');
            
            if (mode === 'audio') {
                visualizerEl.classList.add('visible');
                if (!video.paused) {
                    startVisualizer();
                }
            } else {
                visualizerEl.classList.remove('visible');
                stopVisualizer();
            }
        }

        // ===== EVENT LISTENERS =====
        video.addEventListener('timeupdate', () => {
            if (!video.duration) return;
            const current = formatTime(video.currentTime);
            const total = formatTime(video.duration);
            timeEl.textContent = `${current} / ${total}`;
            const percent = (video.currentTime / video.duration * 100);
            seekbarFill.style.width = percent + '%';
            fullscreenSeekbarFill.style.width = percent + '%';
        });

        video.addEventListener('ended', () => {
            if (isRepeat) {
                video.play();
            } else {
                nextChannel();
            }
        });

        video.addEventListener('play', async () => {
            playBtn.textContent = '❚❚';
            fullscreenPlayBtn.textContent = '❚❚';
            if (!source) {
                await setupAudioVisualizer();
            }
            if (currentMode === 'audio') {
                startVisualizer();
            }
        });

        video.addEventListener('pause', () => {
            playBtn.textContent = '▶';
            fullscreenPlayBtn.textContent = '▶';
            stopVisualizer();
        });

        video.addEventListener('waiting', () => {
            display.textContent = '⏳ Cargando...';
        });

        video.addEventListener('canplay', () => {
            if (!video.paused && FILTERED_PLAYLIST[idx]) {
                display.textContent = FILTERED_PLAYLIST[idx].title;
            }
        });

        video.addEventListener('error', (e) => {
            console.error('Error en video:', e);
            display.textContent = '❌ Error al cargar canal';
        });

        function formatTime(s) {
            if (isNaN(s)) return '00:00';
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
        }

        document.getElementById('search').addEventListener('input', () => {
            setTimeout(filterItems, 300);
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && isFullscreen) {
                exitFullscreenMode();
            }
            if (e.key === 'f' || e.key === 'F') {
                toggleFullscreen();
            }
        });

        // ===== INICIALIZACIÓN =====
        initVisualizer();
        loadAllChannels();

        // Exponer funciones globales
        window.setMode = setMode;
        window.toggleAudioPlay = toggleAudioPlay;
        window.pauseAudio = pauseAudio;
        window.stopAudio = stopAudio;
        window.nextChannel = nextChannel;
        window.prevChannel = prevChannel;
        window.seekAudio = seekAudio;
        window.setVolume = setVolume;
        window.toggleShuffle = () => isShuffle = !isShuffle;
        window.toggleRepeat = () => isRepeat = !isRepeat;
        window.toggleFullscreen = toggleFullscreen;
        window.exitFullscreenMode = exitFullscreenMode;
        window.seekFullscreen = seekFullscreen;
    </script>
